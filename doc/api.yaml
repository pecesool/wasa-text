openapi: 3.0.9
info:
  title: WASAText
  version: '0.1'
  description: 'Simple messaging app API for the WASA project.

    "Login" is simplified and used only for testing (no real security).

    '
servers:
- url: /api
tags:
- name: Session
  description: Simplified login (create or reuse users).
- name: Me
  description: Operations on the currently impersonated user.
- name: Users
  description: Users listing and user search for UI.
- name: Conversations
  description: Conversations and messages APIs.
- name: Groups
  description: Group management APIs.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UserIdentifier
  schemas:
    Error:
      type: object
      description: Standard error response.
      properties:
        message:
          type: string
          description: Human readable error.
          minLength: 1
          maxLength: 200
          pattern: ^.*$
      required:
      - message
    LoginRequest:
      type: object
      description: Simplified login request. No password.
      properties:
        name:
          type: string
          description: Username.
          minLength: 3
          maxLength: 16
          pattern: ^.*$
      required:
      - name
    LoginResponse:
      type: object
      description: Simplified login response.
      properties:
        identifier:
          type: string
          description: User identifier to be used as Bearer token.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      required:
      - identifier
    SetMyUserNameRequest:
      type: object
      description: Update current user name.
      properties:
        name:
          type: string
          description: New username.
          minLength: 3
          maxLength: 16
          pattern: ^.*$
      required:
      - name
    SetGroupNameRequest:
      type: object
      description: Update group name.
      properties:
        name:
          type: string
          description: New group name.
          minLength: 3
          maxLength: 32
          pattern: ^.*$
      required:
      - name
    UsersResponse:
      type: object
      description: Users list response.
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserItem'
      required:
      - users
    UserItem:
      type: object
      description: User item.
      properties:
        id:
          type: string
          description: User id.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        name:
          type: string
          description: Username.
          minLength: 3
          maxLength: 16
          pattern: ^.*$
        photoUrl:
          type: string
          description: URL to user photo (if any).
          minLength: 0
          maxLength: 200
          pattern: ^.*$
      required:
      - id
      - name
    ConversationItem:
      type: object
      description: Conversation list item.
      properties:
        conversationId:
          type: string
          description: Conversation id.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        title:
          type: string
          description: Username or group name.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        photoUrl:
          type: string
          description: Conversation/group photo (if any).
          minLength: 0
          maxLength: 200
          pattern: ^.*$
        lastTime:
          type: string
          description: Timestamp of latest message.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        lastPreview:
          type: string
          description: Preview/snippet of last text message or placeholder for photo.
          minLength: 0
          maxLength: 200
          pattern: ^.*$
        lastIsPhoto:
          type: boolean
          description: True if last message is a photo.
      required:
      - conversationId
      - title
      - lastTime
      - lastIsPhoto
    ConversationsListResponse:
      type: object
      description: Conversations list response.
      properties:
        conversations:
          type: array
          items:
            $ref: '#/components/schemas/ConversationItem'
      required:
      - conversations
    Conversation:
      type: object
      description: Full conversation.
      properties:
        conversationId:
          type: string
          description: Conversation id.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        title:
          type: string
          description: Username or group name.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        isGroup:
          type: boolean
          description: Whether the conversation is a group.
        members:
          type: array
          description: Group members (empty for non-group).
          items:
            $ref: '#/components/schemas/UserItem'
        messages:
          type: array
          description: Messages (reverse chronological in UI).
          items:
            $ref: '#/components/schemas/Message'
      required:
      - conversationId
      - title
      - isGroup
      - messages
    Message:
      type: object
      description: Message object.
      properties:
        messageId:
          type: string
          description: Message id.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        time:
          type: string
          description: Message timestamp.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
        from:
          type: string
          description: Sender username.
          minLength: 1
          maxLength: 16
          pattern: ^.*$
        text:
          type: string
          description: Text content (when isPhoto is false).
          minLength: 0
          maxLength: 2000
          pattern: ^.*$
        photoUrl:
          type: string
          description: Photo URL (when isPhoto is true).
          minLength: 0
          maxLength: 200
          pattern: ^.*$
        isPhoto:
          type: boolean
          description: Whether message contains a photo.
        received:
          type: boolean
          description: One checkmark in UI.
        read:
          type: boolean
          description: Two checkmarks in UI.
        replyTo:
          type: string
          description: Message id this message replies to (optional).
          minLength: 0
          maxLength: 64
          pattern: ^.*$
        forwardedFrom:
          type: string
          description: Original conversation id if forwarded (optional).
          minLength: 0
          maxLength: 64
          pattern: ^.*$
        reactions:
          type: array
          description: Reactions/comments on the message.
          items:
            $ref: '#/components/schemas/Reaction'
      required:
      - messageId
      - time
      - isPhoto
      - received
      - read
    Reaction:
      type: object
      description: Message reaction/comment.
      properties:
        user:
          type: string
          description: Username who reacted.
          minLength: 1
          maxLength: 16
          pattern: ^.*$
        emoji:
          type: string
          description: Reaction emoji.
          minLength: 1
          maxLength: 16
          pattern: ^.*$
      required:
      - user
      - emoji
    ConversationsRequest:
      type: object
      description: Create direct conversation with another user.
      properties:
        userId:
          type: string
          description: User id to start conversation with.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      required:
      - userId
    ConversationsResponse:
      type: object
      description: Conversation creation response.
      properties:
        conversationId:
          type: string
          description: Created conversation id.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
    SendMessageRequest:
      type: object
      description: Send a message.
      properties:
        text:
          type: string
          description: Text content.
          minLength: 1
          maxLength: 2000
          pattern: ^.*$
      required:
      - text
    ForwardMessageRequest:
      type: object
      description: Forward a message to another conversation.
      properties:
        toConversationId:
          type: string
          description: Target conversation id.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      required:
      - toConversationId
    CommentMessageRequest:
      type: object
      description: Add a reaction/comment to a message.
      properties:
        emoji:
          type: string
          description: Emoji.
          minLength: 1
          maxLength: 16
          pattern: ^.*$
      required:
      - emoji
    AddToGroupRequest:
      type: object
      description: Add a user to a group.
      properties:
        userId:
          type: string
          description: User id to add.
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      required:
      - userId
security:
- bearerAuth: []
paths:
  /session:
    post:
      tags:
      - Session
      summary: Logs in the user
      description: 'If the user does not exist, it will be created, and an identifier
        is returned. If the user exists, the user identifier is returned.'
      operationId: doLogin
      requestBody:
        description: User details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: User log-in action successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /me/name:
    put:
      tags:
      - Me
      summary: Updates current user's name
      operationId: setMyUserName
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetMyUserNameRequest'
      responses:
        '204':
          description: Updated
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Name already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /me/photo:
    put:
      tags:
      - Me
      summary: Updates current user's photo
      operationId: setMyPhoto
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              pattern: ^.*$
      responses:
        '204':
          description: Updated
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users:
    get:
      tags:
      - Users
      summary: Lists users
      operationId: getUsers
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponse'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /conversations:
    get:
      tags:
      - Conversations
      summary: Lists conversations
      operationId: getMyConversations
      responses:
        '200':
          description: Conversations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationsListResponse'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
      - Conversations
      summary: Creates a direct conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationsRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationsResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /conversations/{conversationId}:
    get:
      tags:
      - Conversations
      summary: Gets a conversation
      operationId: getConversation
      parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      responses:
        '200':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /conversations/{conversationId}/messages:
    post:
      tags:
      - Conversations
      summary: Sends a message
      operationId: sendMessage
      parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /messages/{messageId}/forward:
    post:
      tags:
      - Conversations
      summary: Forwards a message
      operationId: forwardMessage
      parameters:
      - name: messageId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForwardMessageRequest'
      responses:
        '201':
          description: Message forwarded
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /messages/{messageId}/comment:
    post:
      tags:
      - Conversations
      summary: Reacts/comments a message
      operationId: commentMessage
      parameters:
      - name: messageId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentMessageRequest'
      responses:
        '201':
          description: Comment added
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /messages/{messageId}/comment:
    delete:
      tags:
      - Conversations
      summary: Deletes reaction/comment
      operationId: uncommentMessage
      parameters:
      - name: messageId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      responses:
        '204':
          description: Comment removed
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /messages/{messageId}:
    delete:
      tags:
      - Conversations
      summary: Deletes a sent message
      operationId: deleteMessage
      parameters:
      - name: messageId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      responses:
        '204':
          description: Message deleted
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups:
    post:
      tags:
      - Groups
      summary: Creates a group
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                members:
                  type: array
                  description: Initial group members user ids.
                  items:
                    type: string
                    minLength: 1
                    maxLength: 64
                    pattern: ^.*$
              required:
              - members
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationsResponse'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{groupId}/name:
    put:
      tags:
      - Groups
      summary: Updates group name
      operationId: setGroupName
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetGroupNameRequest'
      responses:
        '204':
          description: Updated
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{groupId}/photo:
    put:
      tags:
      - Groups
      summary: Updates group photo
      operationId: setGroupPhoto
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              pattern: ^.*$
      responses:
        '204':
          description: Updated
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{groupId}/members:
    post:
      tags:
      - Groups
      summary: Adds a user to group
      operationId: addToGroup
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToGroupRequest'
      responses:
        '204':
          description: Added
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Group or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{groupId}/leave:
    post:
      tags:
      - Groups
      summary: Leaves a group
      operationId: leaveGroup
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^.*$
      responses:
        '204':
          description: Left
        '401':
          description: Not logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
